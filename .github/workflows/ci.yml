name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  lint-api:
    name: Lint & TypeCheck API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nmt-analytics-api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: nmt-analytics-api/package-lock.json

      - run: npm ci

      - run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  lint-admin:
    name: Lint & Build Admin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nmt-analytics-admin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: nmt-analytics-admin/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: nmt-analytics-api
          file: nmt-analytics-api/Dockerfile
          push: false
          tags: nmt-analytics-api:ci

      - name: Build Admin image
        uses: docker/build-push-action@v5
        with:
          context: nmt-analytics-admin
          file: nmt-analytics-admin/Dockerfile
          push: false
          tags: nmt-analytics-admin:ci
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            VITE_API_URL=/api
